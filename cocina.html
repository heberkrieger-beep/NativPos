<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#14171f">
<title>Nativ POS — Cocina</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --ink-900:#14171f;--ink-700:#4b5160;--ink-500:#969cab;--ink-300:#d6d9e1;--ink-100:#f2f3f6;
  --money:#0f9d58;--money-soft:#e6f7ee;--money-deep:#0a7a43;
  --warn:#d97a06;--warn-soft:#fef3e2;
  --danger:#e0293f;--danger-soft:#fdeaed;
  --brand:#1a3fa0;
  --ease:cubic-bezier(.22,.85,.32,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#14171f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#1e2330}
::-webkit-scrollbar-thumb{background:#3a3f52;border-radius:99px}

.topbar{padding:14px 20px;display:flex;align-items:center;gap:12px;background:#1a1d28;border-bottom:1px solid #2a2d3a}
.logo{width:32px;height:32px;border-radius:9px;flex-shrink:0}
.title{font-size:16px;font-weight:800;color:#fff}
.subtitle{font-size:12px;color:var(--ink-500);font-weight:600}
.status{display:flex;align-items:center;gap:6px;margin-left:auto;font-size:12px;font-weight:700}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--money);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.last-update{font-size:11px;color:var(--ink-500);font-weight:600}

.content{padding:16px;overflow-y:auto;height:calc(100vh - 65px)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;color:var(--ink-500)}
.empty i{font-size:56px;color:#2a2d3a}
.empty p{font-size:15px;font-weight:700}
.empty span{font-size:12px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

.mesa-card{background:#1e2330;border-radius:18px;overflow:hidden;border:1.5px solid #2a2d3a}
.mesa-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2d3a}
.mesa-nombre{font-size:15px;font-weight:800}
.mesa-timer{font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px}
.mesa-timer.ok{background:#1a3a28;color:var(--money)}
.mesa-timer.warn{background:#3a2a10;color:var(--warn)}
.mesa-timer.late{background:#3a1a1a;color:var(--danger)}

.item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #2a2d3a;cursor:pointer;transition:background .1s}
.item:last-child{border-bottom:none}
.item:active{background:#252839}
.item.listo{opacity:.45}
.item-cant{width:32px;height:32px;border-radius:9px;background:#252839;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0}
.item-nombre{flex:1;font-size:14px;font-weight:700;line-height:1.3}
.item-nota{font-size:11px;color:var(--warn);font-weight:600;margin-top:2px}
.item-estado{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s var(--ease)}
.item-estado.pendiente{background:#252839;color:var(--ink-500)}
.item-estado.cocina{background:#3a2a10;color:var(--warn)}
.item-estado.listo{background:#1a3a28;color:var(--money)}

.btn-listo-todo{width:100%;padding:11px;background:#1a3a28;color:var(--money);border:none;border-radius:0 0 16px 16px;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:background .12s}
.btn-listo-todo:active{background:#0f2a1c}

@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.mesa-card{animation:slideIn .25s var(--ease)}
</style>
</head>
<body>

<div class="topbar">
  <svg class="logo" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#1a3fa0"/><polygon points="18,80 18,20 30,20 58,56 58,20 72,20 72,80 58,80 30,44 30,80" fill="white"/><polygon points="18,20 30,20 44,42 30,42" fill="#e0293f"/></svg>
  <div>
    <div class="title">Cocina</div>
    <div id="negocio-name" class="subtitle">Nativ POS</div>
  </div>
  <div class="status" id="status">
    <span class="status-dot"></span>
    <span>En vivo</span>
  </div>
  <div class="last-update" id="last-update"></div>
</div>

<div class="content" id="content">
  <div class="empty">
    <i class="ti ti-tool-kitchen-2"></i>
    <p>Cargando pedidos...</p>
  </div>
</div>

<script type="module">
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './src/supabase-config.js';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const POLL_MS = 12000; // actualizar cada 12 segundos

let negocioId = null;
let pedidos = [];
let timer = null;

// ── Sonido de nuevo pedido ─────────────────────────────────
function beep(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + .4);
  } catch(e){}
}

// ── Auth y negocio ─────────────────────────────────────────
async function init(){
  const { data } = await sb.auth.getUser();
  if(!data?.user){ mostrarError('Necesitás estar logueado. <a href="./auth.html" style="color:#7ab4f5">Ingresar</a>'); return; }

  const { data: negocios } = await sb.from('negocios').select('id,nombre').eq('owner_id', data.user.id).limit(1);
  if(!negocios?.length){ mostrarError('No se encontró el negocio.'); return; }
  negocioId = negocios[0].id;
  document.getElementById('negocio-name').textContent = negocios[0].nombre;

  await cargar();
  timer = setInterval(cargar, POLL_MS);
}

// ── Cargar pedidos ─────────────────────────────────────────
async function cargar(){
  if(!negocioId) return;
  const { data, error } = await sb
    .from('pedidos_mesa')
    .select('*, mesas(nombre)')
    .eq('negocio_id', negocioId)
    .in('estado', ['pendiente','cocina'])
    .order('creado_en', { ascending: true });

  if(error){ console.error(error); return; }

  // Detectar nuevos pedidos para beep
  const nuevosIds = (data||[]).map(p=>p.id);
  const viejosIds = pedidos.map(p=>p.id);
  const hayNuevos = nuevosIds.some(id => !viejosIds.includes(id));
  if(hayNuevos && pedidos.length > 0) beep();

  pedidos = data || [];
  render();

  const now = new Date();
  document.getElementById('last-update').textContent =
    `Actualizado ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
}

// ── Render ─────────────────────────────────────────────────
function render(){
  const el = document.getElementById('content');
  if(!pedidos.length){
    el.innerHTML = `<div class="empty"><i class="ti ti-check"></i><p>Todo al día</p><span>Sin pedidos pendientes</span></div>`;
    return;
  }

  // Agrupar por mesa
  const mesas = {};
  pedidos.forEach(p => {
    const mesaNombre = p.mesas?.nombre || 'Mesa ?';
    if(!mesas[p.mesa_id]) mesas[p.mesa_id] = { nombre: mesaNombre, items: [], ts: p.creado_en };
    mesas[p.mesa_id].items.push(p);
    if(p.creado_en < mesas[p.mesa_id].ts) mesas[p.mesa_id].ts = p.creado_en;
  });

  el.innerHTML = `<div class="grid">${Object.entries(mesas).map(([mesaId, m]) => {
    const mins = Math.floor((Date.now() - new Date(m.ts)) / 60000);
    const timerClass = mins < 10 ? 'ok' : mins < 20 ? 'warn' : 'late';
    const pendientes = m.items.filter(i=>i.estado!=='listo').length;

    return `<div class="mesa-card" id="mesa-${mesaId}">
      <div class="mesa-head">
        <span class="mesa-nombre">${m.nombre}</span>
        <span class="mesa-timer ${timerClass}"><i class="ti ti-clock" style="font-size:11px"></i> ${mins}m</span>
      </div>
      ${m.items.map(item => `
        <div class="item ${item.estado==='listo'?'listo':''}" onclick="toggleItem('${item.id}','${item.estado}')">
          <div class="item-cant" style="color:${item.estado==='cocina'?'var(--warn)':'#fff'}">${item.cantidad}×</div>
          <div>
            <div class="item-nombre">${item.nombre_producto}</div>
            ${item.nota ? `<div class="item-nota">⚠ ${item.nota}</div>` : ''}
          </div>
          <div class="item-estado ${item.estado}">
            <i class="ti ${item.estado==='listo'?'ti-check':item.estado==='cocina'?'ti-flame':'ti-clock'}"></i>
          </div>
        </div>`).join('')}
      ${pendientes > 0 ? `<button class="btn-listo-todo" onclick="todosListos('${mesaId}')">
        <i class="ti ti-checks"></i> Todo listo — ${m.nombre}
      </button>` : ''}
    </div>`;
  }).join('')}</div>`;
}

// ── Acciones ───────────────────────────────────────────────
window.toggleItem = async function(id, estadoActual){
  const siguiente = estadoActual === 'pendiente' ? 'cocina' : estadoActual === 'cocina' ? 'listo' : 'pendiente';
  await sb.from('pedidos_mesa').update({ estado: siguiente }).eq('id', id);
  pedidos = pedidos.map(p => p.id===id ? {...p, estado:siguiente} : p)
    .filter(p => p.estado !== 'listo' ? true : false); // quitar los listos del KDS
  render();
};

window.todosListos = async function(mesaId){
  await sb.from('pedidos_mesa').update({ estado:'listo' }).eq('mesa_id', mesaId).in('estado',['pendiente','cocina']);
  pedidos = pedidos.filter(p => p.mesa_id !== mesaId);
  render();
};

function mostrarError(msg){
  document.getElementById('content').innerHTML = `<div class="empty"><i class="ti ti-alert-circle" style="color:var(--danger)"></i><p style="color:var(--danger)">${msg}</p></div>`;
}

init();
</script>
</body>
</html>
