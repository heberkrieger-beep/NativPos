<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a3fa0">
<title>Nativ POS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px;
  --r-sm:12px;--r-md:18px;--r-lg:24px;--r-pill:99px;
  --ink-900:#14171f;--ink-700:#4b5160;--ink-500:#969cab;--ink-300:#d6d9e1;--ink-100:#f2f3f6;--ink-0:#fff;
  --brand:#1a3fa0;--brand-deep:#0d2570;--brand-soft:#eaeefb;
  --money:#0f9d58;--money-deep:#0a7a43;--money-soft:#e6f7ee;
  --danger:#e0293f;--danger-soft:#fdeaed;
  --warn:#d97a06;--warn-soft:#fef3e2;
  --shadow-card:0 1px 2px rgba(20,23,31,.04),0 2px 8px rgba(20,23,31,.06);
  --shadow-float:0 8px 24px rgba(20,23,31,.12),0 2px 6px rgba(20,23,31,.06);
  --shadow-cta:0 10px 24px rgba(15,157,88,.35);
  --ease:cubic-bezier(.22,.85,.32,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;background:var(--ink-100);color:var(--ink-900);-webkit-font-smoothing:antialiased;overflow:hidden}
#app{max-width:430px;margin:0 auto;height:100vh;background:var(--ink-100);position:relative;display:flex;flex-direction:column;overflow:hidden}
input,select,textarea{border:1.5px solid var(--ink-300);border-radius:var(--r-sm);padding:12px 14px;width:100%;font-size:15px;background:#fff;color:var(--ink-900);outline:none;transition:border-color .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--brand)}
button{font-family:inherit;cursor:pointer}
.lbl{font-size:13px;color:var(--ink-700);font-weight:700;display:block;margin-bottom:6px}
.field{margin-bottom:14px}
.btn-primary{width:100%;padding:16px;background:var(--brand);color:#fff;border:none;border-radius:var(--r-md);font-size:16px;font-weight:800;box-shadow:0 10px 24px rgba(26,63,160,.3);display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s var(--ease)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.4;box-shadow:none}
.btn-money{width:100%;padding:16px;background:var(--money);color:#fff;border:none;border-radius:var(--r-md);font-size:16px;font-weight:800;box-shadow:var(--shadow-cta);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-ghost{width:100%;padding:12px;background:none;border:none;color:var(--brand);font-size:14px;font-weight:700}
.btn-danger-ghost{width:100%;padding:12px;background:none;border:1.5px solid var(--danger);color:var(--danger);border-radius:var(--r-md);font-size:14px;font-weight:700}
.card{background:var(--ink-0);border-radius:var(--r-md);box-shadow:var(--shadow-card)}
.sec-label{font-size:12px;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.err{background:var(--danger-soft);color:var(--danger);border-radius:var(--r-sm);padding:11px 13px;font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade{animation:fadeIn .2s var(--ease)}
.center-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
/* Scrollbars ocultos en mobile look */
::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="app"></div>












<script type="module">
import * as DB from './src/db.js';

const A = '#1a3fa0', R2 = '#e0293f', MONEY = '#0f9d58';
const LOGO_ICO = `<svg width="32" height="32" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#1a3fa0"/><polygon points="18,80 18,20 30,20 58,56 58,20 72,20 72,80 58,80 30,44 30,80" fill="white"/><polygon points="18,20 30,20 44,42 30,42" fill="#e0293f"/></svg>`;
const LOGO_BIG = `<svg width="64" height="64" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="#1a3fa0"/><polygon points="18,80 18,20 30,20 58,56 58,20 72,20 72,80 58,80 30,44 30,80" fill="white"/><polygon points="18,20 30,20 44,42 30,42" fill="#e0293f"/></svg>`;

// ── ESTADO GLOBAL ────────────────────────────────────────────
let S = window.S = {
  loading: true,
  error: '',
  negocio: null,
  empleados: [],
  empleadoActivo: null,   // {id,nombre,rol} — null = dueño operando directo
  turno: null,
  productos: [],
  categorias: [],
  clientes: [],
  mesas: [],

  tab: 'vender',           // vender | mesas | caja | mas
  masScreen: null,         // null = menú "más" | 'productos' | 'clientes' | 'reportes' | 'finanzas' | 'config' | 'empleados'
  itemsListos: {},         // { mesaId: count } — items marcados listos por cocina
  pedidosPorMesa: {},      // { mesaId: [pedidos] } — para calcular color de estado en el mapa
  pollTimer: null,         // referencia al setInterval de polling

  // PIN
  pinSel: null, pinBuffer: '', pinError: '',

  // Vender
  cart: {}, fcat: 'Todos', fq: '', sheet: null,
  disc: 0, nota: '',
  pm: 'efectivo', cstep: 'metodo', cash: '',
  selCliente: null, csq: '',

  // Mesas
  mesaSel: null, mesaView: 'mapa', mesaZona: 'Salón', mesaAddView: false, mesaFq: '',
  mesaCobrarSheet: false, mesaPM: 'efectivo', mesaCash: '',
};

function R(){ window.S = S; document.getElementById('app').innerHTML = render(); afterRender(); }
window.R = R;

const f$ = n => '$' + (Math.round(n) || 0).toLocaleString('es-AR');

// Devuelve el HTML interior de un "icono" de producto: foto real si existe, o emoji.
function prodIcono(p, fontSize){
  if(p.foto_url) return `<img src="${p.foto_url}" style="width:100%;height:100%;object-fit:cover">`;
  return `<span style="font-size:${fontSize}px">${p.emoji||'📦'}</span>`;
}

// ── BOOT ──────────────────────────────────────────────────────
// ── SONIDO Y POLLING (mesero) ────────────────────────────────
function sonarAlerta(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [660, 880].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ctx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0.3, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
    });
  } catch(e){}
}

async function pollItemsListos(){
  // Solo correr si la app está completamente cargada, hay sesión y hay turno abierto
  if(S.loading || !S.negocio || !S.turno || !S.empleadoActivo) return;
  try {
    // Traemos TODOS los pedidos activos (pendiente/cocina/listo) para poder
    // calcular el color real de cada mesa en el mapa, no solo contar "listos".
    const { data } = await DB.sb.from('pedidos_mesa')
      .select('mesa_id, estado')
      .eq('negocio_id', S.negocio.id)
      .in('estado', ['pendiente','cocina','listo']);

    const porMesa = {};
    const conteo = {};
    (data || []).forEach(p => {
      if(!porMesa[p.mesa_id]) porMesa[p.mesa_id] = [];
      porMesa[p.mesa_id].push(p);
      if(p.estado === 'listo') conteo[p.mesa_id] = (conteo[p.mesa_id] || 0) + 1;
    });

    const hayNuevo = Object.entries(conteo).some(([mid, cnt]) => (S.itemsListos[mid] || 0) < cnt);
    if(hayNuevo) sonarAlerta();

    const cambio = JSON.stringify(porMesa) !== JSON.stringify(S.pedidosPorMesa || {});
    S.itemsListos = conteo;
    S.pedidosPorMesa = porMesa;
    if(cambio && S.tab === 'mesas') R();
  } catch(e){}
}


function invalidarCache(){
  try { sessionStorage.removeItem('nativ_cache_' + S.negocio.id); } catch(e){}
}
async function boot(){
  try {
    const user = await DB.getSessionUser();
    if(!user){ window.location.href = './auth.html'; return; }

    const negocio = await DB.getMiNegocio();
    if(!negocio){ window.location.href = './auth.html'; return; }
    S.negocio = negocio;

    // Cache de datos estáticos en sessionStorage para arranque más rápido.
    // Los productos y mesas raramente cambian entre recargas dentro del mismo turno.
    const cacheKey = 'nativ_cache_' + negocio.id;
    let cache = null;
    try { cache = JSON.parse(sessionStorage.getItem(cacheKey)); } catch(e){}

    let empleados, productos, categorias, clientes, mesas, turno;
    if(cache && cache.ts && (Date.now() - cache.ts < 5 * 60 * 1000)){
      // Usar cache (máximo 5 minutos de antigüedad) para productos/mesas/categorias
      empleados = cache.empleados;
      productos = cache.productos;
      categorias = cache.categorias;
      clientes = cache.clientes;
      mesas = cache.mesas;
      // El turno siempre se consulta en vivo (puede haber cambiado)
      turno = await DB.turnoAbierto(negocio.id);
    } else {
      // Primera carga o cache expirado: pedir todo en paralelo
      [empleados, productos, categorias, clientes, mesas, turno] = await Promise.all([
        DB.listarEmpleados(negocio.id),
        DB.listarProductos(negocio.id),
        DB.listarCategorias(negocio.id),
        DB.listarClientes(negocio.id),
        DB.listarMesas(negocio.id),
        DB.turnoAbierto(negocio.id),
      ]);
      try { sessionStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), empleados, productos, categorias, clientes, mesas })); } catch(e){}
    }

    S.empleados = empleados;
    S.productos = productos;
    S.categorias = categorias.length ? categorias : [{ id: null, nombre: 'General', color: '#B5D4F4' }];
    S.clientes = clientes;
    S.mesas = mesas;
    S.turno = turno;

    // Nota: el dueño ahora SIEMPRE tiene un registro en empleados con rol 'dueno'
    // y su propio PIN (creado en el onboarding). Si por alguna razón un negocio
    // viejo no tiene ningún empleado todavía, lo mandamos a crear su PIN ahora.
    if(empleados.length === 0){
      S.necesitaCrearPinDueno = true;
    }

    S.loading = false;
    R();

    // Arrancar polling solo si ya hay turno abierto
    if(S.pollTimer) clearInterval(S.pollTimer);
    if(turno){
      S.pollTimer = setInterval(pollItemsListos, 15000);
    }

  } catch(e) {
    console.error('[Nativ POS] Error en boot:', e);
    S.loading = false;
    S.error = 'Error al cargar: ' + e.message;
    R();
  }
}

boot();

// ════════════════════════════════════════════════════════════
// RENDER PRINCIPAL
// ════════════════════════════════════════════════════════════
function render(){
  if(S.loading) return renderLoading();
  if(S.error) return renderLoading();
  if(S.necesitaCrearPinDueno) return renderCrearPinDueno();
  if(!S.empleadoActivo) return renderPIN();

  // El cocinero no pasa por turno ni tab bar: va directo a su pantalla,
  // sin acceso a ninguna otra parte de la app.
  if(S.empleadoActivo.rol === 'cocinero') return renderCocina();

  if(!S.turno) return renderAbrirTurno();

  // Protección de rol: un mesero nunca debe poder caer en Vender ni Caja,
  // sin importar en qué tab haya quedado guardado el estado. Si su rol no
  // tiene permiso para el tab actual, lo mandamos a Mesas (su pantalla por defecto).
  const rolActivo = S.empleadoActivo.rol;
  const tabsPermitidos = {
    mesero: ['mesas', 'mas'],
    cajero: ['vender', 'mesas', 'caja', 'mas'],
    dueno: ['vender', 'mesas', 'caja', 'mas'],
  };
  const permitidos = tabsPermitidos[rolActivo] || ['vender','mesas','caja','mas'];
  if(!permitidos.includes(S.tab)){
    S.tab = permitidos.includes('mesas') ? 'mesas' : permitidos[0];
  }

  let body = '';
  if(S.tab === 'vender') body = renderVender();
  else if(S.tab === 'mesas') body = renderMesas();
  else if(S.tab === 'caja') body = renderCaja();
  else if(S.tab === 'mas') body = renderMas();

  return `<div style="display:flex;flex-direction:column;height:100%">${body}${renderTabBar()}</div>`;
}

function renderLoading(){
  if(S.error) return `<div class="center-screen">${LOGO_BIG}
    <div style="margin-top:16px;font-size:13px;color:var(--danger);font-weight:700;text-align:center;max-width:280px">${S.error}</div>
    <button onclick="window.location.reload()" style="margin-top:16px;padding:10px 20px;background:var(--brand);color:#fff;border:none;border-radius:99px;font-size:13px;font-weight:700">Reintentar</button>
  </div>`;
  return `<div class="center-screen">${LOGO_BIG}<div style="margin-top:16px;font-size:14px;color:var(--ink-500);font-weight:700">Cargando Nativ POS...</div></div>`;
}

// ════════════════════════════════════════════════════════════
// PIN DE EMPLEADOS
// ════════════════════════════════════════════════════════════
function renderCrearPinDueno(){
  return `<div class="center-screen fade">
    <div style="width:64px;height:64px;border-radius:50%;background:#fef3e2;display:flex;align-items:center;justify-content:center;margin-bottom:14px"><i class="ti ti-shield-lock" style="font-size:28px;color:var(--warn)"></i></div>
    <div style="font-size:18px;font-weight:800;margin-bottom:4px">Creá tu PIN de acceso</div>
    <div style="font-size:13px;color:var(--ink-500);text-align:center;margin-bottom:22px;max-width:280px">Vas a usar este PIN de 4 dígitos para entrar a la caja de ahora en más, en vez de tu email y contraseña.</div>
    ${S.pinError ? `<div class="err"><i class="ti ti-alert-circle"></i>${S.pinError}</div>` : ''}
    <div class="field" style="width:100%">
      <label class="lbl">Elegí un PIN de 4 dígitos</label>
      <input id="cpd-pin" type="text" inputmode="numeric" maxlength="4" placeholder="1234" style="font-size:22px;font-weight:800;letter-spacing:6px;text-align:center">
    </div>
    <button class="btn-primary" onclick="crearPinDueno()"><i class="ti ti-check"></i> Confirmar PIN</button>
  </div>`;
}

function renderPIN(){
  const sel = S.pinSel;
  if(!sel){
    return `<div class="center-screen fade" style="justify-content:flex-start;padding-top:60px">
      ${LOGO_BIG}
      <div style="font-size:18px;font-weight:800;margin:16px 0 4px">¿Quién está usando la caja?</div>
      <div style="font-size:13px;color:var(--ink-500);margin-bottom:24px">${S.negocio.nombre}</div>
      <div style="width:100%;display:flex;flex-direction:column;gap:10px">
        ${S.empleados.map(e => `
          <div onclick="selectPinUser('${e.id}')" class="card" style="display:flex;align-items:center;gap:13px;padding:14px 16px;cursor:pointer">
            <div style="width:44px;height:44px;border-radius:50%;background:${e.rol==='dueno'?'#fef3e2':'var(--brand-soft)'};display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:${e.rol==='dueno'?'var(--warn)':'var(--brand)'}">${e.rol==='dueno'?'<i class="ti ti-crown" style="font-size:18px"></i>':e.nombre.charAt(0).toUpperCase()}</div>
            <div><div style="font-size:15px;font-weight:700">${e.nombre}</div><div style="font-size:12px;color:var(--ink-500);font-weight:600">${rolLabel(e.rol)}</div></div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  const emp = S.empleados.find(e => e.id === sel);
  return `<div class="center-screen fade">
    <div style="width:56px;height:56px;border-radius:50%;background:var(--brand-soft);display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;color:var(--brand);margin-bottom:12px">${emp?.nombre.charAt(0).toUpperCase()}</div>
    <div style="font-size:16px;font-weight:800;margin-bottom:4px">${emp?.nombre}</div>
    <div style="font-size:12px;color:var(--ink-500);margin-bottom:18px">Ingresá tu PIN</div>
    ${S.pinError ? `<div class="err"><i class="ti ti-alert-circle"></i>${S.pinError}</div>` : ''}
    <div style="display:flex;gap:11px;margin-bottom:22px">
      ${[0,1,2,3].map(i => `<div style="width:15px;height:15px;border-radius:50%;background:${i < S.pinBuffer.length ? A : 'var(--ink-300)'}"></div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:260px">
      ${[1,2,3,4,5,6,7,8,9].map(d => `<button onclick="pinPress('${d}')" style="height:58px;border-radius:16px;border:1.5px solid var(--ink-100);background:var(--ink-0);font-size:22px;font-weight:700;box-shadow:var(--shadow-card)">${d}</button>`).join('')}
      <div></div>
      <button onclick="pinPress('0')" style="height:58px;border-radius:16px;border:1.5px solid var(--ink-100);background:var(--ink-0);font-size:22px;font-weight:700;box-shadow:var(--shadow-card)">0</button>
      <button onclick="pinDelete()" style="height:58px;border-radius:16px;border:none;background:none;font-size:20px;color:var(--ink-500)"><i class="ti ti-backspace"></i></button>
    </div>
    <button class="btn-ghost" style="margin-top:18px" onclick="S.pinSel=null;S.pinBuffer='';S.pinError='';R()">Volver</button>
  </div>`;
}

function rolLabel(rol){
  return rol === 'dueno' ? 'Dueño' : rol === 'cajero' ? 'Cajero' : rol === 'mesero' ? 'Mesero' : rol === 'cocinero' ? 'Cocinero' : rol;
}

window.selectPinUser = function(id){ S.pinSel = id; S.pinBuffer=''; S.pinError=''; R(); };

window.crearPinDueno = async function(){
  const pin = document.getElementById('cpd-pin').value.trim();
  if(pin.length !== 4 || !/^\d{4}$/.test(pin)){
    S.pinError = 'El PIN debe ser de 4 números.';
    R();
    return;
  }
  const nombre = S.negocio.nombre_dueno || 'Dueño';
  const { data, error } = await DB.crearEmpleado(S.negocio.id, nombre, pin, 'dueno');
  if(error){
    S.pinError = 'No se pudo crear el PIN: ' + error.message;
    R();
    return;
  }
  S.empleados = await DB.listarEmpleados(S.negocio.id);
  S.necesitaCrearPinDueno = false;
  S.pinError = '';
  // Lo dejamos en la pantalla de selección para que entre con su PIN recién creado
  R();
};

window.pinPress = async function(d){
  if(S.pinBuffer.length >= 4) return;
  S.pinBuffer += d;
  R();
  if(S.pinBuffer.length === 4){
    const result = await DB.validarPinEmpleado(S.negocio.id, S.pinSel, S.pinBuffer);
    if(result){
      S.empleadoActivo = result;
      S.pinSel = null; S.pinBuffer=''; S.pinError='';
      // Tab inicial según rol: el mesero arranca en Mesas, no en Vender
      S.tab = result.rol === 'mesero' ? 'mesas' : 'vender';
      R();
    } else {
      S.pinError = 'PIN incorrecto';
      S.pinBuffer = '';
      R();
      setTimeout(()=>{ S.pinError=''; R(); }, 1800);
    }
  }
};
window.pinDelete = function(){ S.pinBuffer = S.pinBuffer.slice(0,-1); R(); };

// ════════════════════════════════════════════════════════════
// ABRIR TURNO
// ════════════════════════════════════════════════════════════
function renderAbrirTurno(){
  return `<div class="center-screen fade">
    <div style="width:64px;height:64px;border-radius:50%;background:var(--warn-soft);display:flex;align-items:center;justify-content:center;margin-bottom:16px"><i class="ti ti-clock" style="font-size:28px;color:var(--warn)"></i></div>
    <div style="font-size:19px;font-weight:800;margin-bottom:4px">Abrí tu turno</div>
    <div style="font-size:13px;color:var(--ink-500);margin-bottom:24px">${S.negocio.nombre} · ${S.empleadoActivo?.nombre}</div>
    <div class="field" style="width:100%">
      <label class="lbl">Efectivo en caja al inicio</label>
      <input id="at-monto" type="text" inputmode="decimal" placeholder="$0" style="font-size:20px;font-weight:700">
    </div>
    <button class="btn-primary" onclick="doAbrirTurno()"><i class="ti ti-clock-play"></i> Abrir turno</button>
  </div>`;
}

window.doAbrirTurno = async function(){
  const monto = parseFloat(document.getElementById('at-monto').value) || 0;
  const { data, error } = await DB.abrirTurno(S.negocio.id, S.empleadoActivo.id, monto);
  if(!error){
    S.turno = data;
    // Arrancar polling ahora que hay turno
    if(S.pollTimer) clearInterval(S.pollTimer);
    S.pollTimer = setInterval(pollItemsListos, 15000);
    R();
  }
};

// ════════════════════════════════════════════════════════════
// TAB BAR
// ════════════════════════════════════════════════════════════
function renderTabBar(){
  const rol = S.empleadoActivo?.rol;
  const tabs = [
    { id: 'vender', icon: 'ti-shopping-cart', label: 'Vender', show: rol !== 'mesero' },
    { id: 'mesas', icon: 'ti-armchair', label: 'Mesas', show: S.negocio.rubro === 'restaurante' },

function cartSub(){ return Object.entries(S.cart).reduce((a,[id,q])=>{ const p=S.productos.find(x=>x.id===id); return p ? a + p.precio*q : a; },0); }
function discAmt(){ return Math.round(cartSub() * (S.disc/100)); }
function cartTotal(){ return cartSub() - discAmt(); }

window.addToCart = async function(pid){
  const p = S.productos.find(x=>x.id===pid);
  if(!p) return;
  const cur = S.cart[pid] || 0;
  if(p.controla_stock && p.stock - cur <= 0) return;

  // Si el producto tiene modificadores, mostrar selector antes de agregar
  const mods = await DB.listarModificadoresProducto(pid);
  if(mods.length){
    S.cartModSel = { pid, mods, cant: 1, opciones: {} };
    S.sheet = 'cart-mod';
    R();
    return;
  }

  S.cart = { ...S.cart, [pid]: cur + 1 };
  R();
};
window.eliminarDelCarrito = function(pid){
  const c = {...S.cart}; delete c[pid]; S.cart = c; R();
};

window.adjCart = function(pid, delta){
  const p = S.productos.find(x=>x.id===pid);
  const cur = S.cart[pid] || 0;
  const next = cur + delta;
  if(next <= 0){ const c = {...S.cart}; delete c[pid]; S.cart = c; }
  else { if(delta>0 && p.controla_stock && p.stock - cur <= 0) return; S.cart = {...S.cart, [pid]: next}; }
  R();
};

window.toggleCartMod = function(grupoId, opcionId, multiple){
  const opciones = S.cartModSel.opciones || {};
  const actual = opciones[grupoId] || [];
  S.cartModSel.opciones = {
    ...opciones,
    [grupoId]: multiple
      ? (actual.includes(opcionId) ? actual.filter(x=>x!==opcionId) : [...actual, opcionId])
      : (actual.includes(opcionId) ? [] : [opcionId])
  };
  R();
};

window.confirmarCartMod = async function(){
  const sel = S.cartModSel;
  if(!sel) return;
  const p = S.productos.find(x=>x.id===sel.pid);
  const cant = sel.cant || 1;
  const grupos = sel.mods || [];
  const opciones = sel.opciones || {};

  // Guardar modificadores elegidos con la entrada del carrito
  const modsResumen = grupos
    .filter(g => opciones[g.id]?.length)
    .map(g => ({
      grupo: g.nombre,
      opciones: (opciones[g.id]||[]).map(oid=>(g.modificador_opciones||[]).find(o=>o.id===oid)?.nombre).filter(Boolean)
    }));

  // Agregar al carrito con cantidad y notas
  const cur = S.cart[sel.pid] || 0;
  S.cart = { ...S.cart, [sel.pid]: cur + cant };

  // Guardar los modificadores asociados a este producto en el carrito
  if(!S.cartMods) S.cartMods = {};
  S.cartMods[sel.pid] = modsResumen;

  S.sheet = null;
  S.cartModSel = null;
  R();
};

window.updVuelto = function(){
  const cash = parseFloat(document.getElementById('ck-cash').value) || 0;
  const vuelto = Math.max(0, cash - cartTotal());

  if(box) box.style.display = vuelto>0?'flex':'none';
  if(val) val.textContent = f$(vuelto);
};

function itemsParaVenta(){
  return Object.entries(S.cart).map(([id,q])=>{
    const p = S.productos.find(x=>x.id===id);
    return { producto_id: id, nombre_producto: p.nombre, precio_unitario: p.precio, cantidad: q };
  });
}

async function finalizarVenta(metodoPago, clienteId){
  // Capturar datos antes de limpiar el carrito
  const itemsVenta = itemsParaVenta();
  const totalVenta = cartTotal();
  const cantItems = Object.keys(S.cart).length;
  const cartModsSnap = {...(S.cartMods||{})};
  const cartSnap = {...S.cart};

  const { data, error } = await DB.registrarVenta({
    negocioId: S.negocio.id, empleadoId: S.empleadoActivo.id, turnoId: S.turno.id,
    clienteId: clienteId || null,
    subtotal: cartSub(), descuento: discAmt(), total: totalVenta,
    metodoPago, efectivoRecibido: metodoPago==='efectivo' ? (parseFloat(S.cash)||0) : null,
    nota: S.nota || null, items: itemsVenta,
  });
  if(error){ alert('Error al registrar venta: ' + error.message); return; }

  // Mandar a cocina si hay productos con modificadores o si el negocio es restaurante
  // Creamos un pedido de caja en pedidos_mesa con una "mesa virtual" de caja
  const itemsConMods = Object.entries(cartSnap).filter(([pid]) => cartModsSnap[pid]?.length);
  if(itemsConMods.length){
    // Insertamos en pedidos_mesa como pedidos de "caja" sin mesa asignada
    for(const [pid, cant] of itemsConMods){
      const p = S.productos.find(x=>x.id===pid);
      if(!p) continue;
      const { data: pedido } = await DB.sb.from('pedidos_mesa').insert({
        negocio_id: S.negocio.id,
        mesa_id: null,
        empleado_id: S.empleadoActivo.id,
        producto_id: pid,
        nombre_producto: p.nombre,
        precio_unitario: p.precio,
        cantidad: cant,
        estado: 'pendiente',
        modificadores: cartModsSnap[pid] || [],
        es_caja: true,
      }).select().single();
      if(pedido) {
        // Auto-marcar como en cocina para que aparezca inmediatamente
        await DB.sb.from('pedidos_mesa').update({ estado: 'cocina' }).eq('id', pedido.id);
      }
    }
  }

  // Refrescar productos (por el stock descontado)
  S.productos = await DB.listarProductos(S.negocio.id);
  S.lastSale = { total: totalVenta, items: cantItems };
  S.cart = {}; S.disc = 0; S.nota=''; S.cash=''; S.selCliente=null; S.cartMods={};
  S.sheet = 'success'; S.cstep='metodo';
  R();
}
window.confirmarVentaDirecta = function(){ finalizarVenta(S.pm, null); };
window.confirmarVentaCtaCte = function(){ finalizarVenta('ctacte', S.selCliente); };

// Calcula el "color de estado de cocina" de una mesa según sus pedidos activos.
// Prioridad: listo > cocina > pendiente > (solo ocupada sin pedidos) > libre
function estadoCocinaMesa(mesaId){
  const items = (S.pedidosPorMesa && S.pedidosPorMesa[mesaId]) || [];
  if(!items.length) return null;
  if(items.some(i=>i.estado==='listo')) return 'listo';
  if(items.some(i=>i.estado==='cocina')) return 'cocina';
  return 'pendiente';
}

      <div style="flex:1;text-align:center;padding:9px;border-radius:var(--r-sm);background:var(--ink-100)"><div style="font-size:18px;font-weight:800;color:var(--ink-500)">${libres}</div><div style="font-size:10px;color:var(--ink-500);font-weight:700">Libres</div></div>
    </div>

    </div>
    <div style="flex:1;overflow-y:auto;padding:14px var(--sp-4)">
      ${!enZona.length ? `<div style="text-align:center;padding:30px;color:var(--ink-500)"><i class="ti ti-armchair" style="font-size:36px;display:block;margin-bottom:10px"></i><p style="font-size:13px">Sin mesas en ${S.mesaZona}. Tocá + para agregar.</p></div>` : `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        ${enZona.map(m => {
          // Sistema de color por estado real de cocina, no solo "ocupada/libre"

          const estCocina = estadoCocinaMesa(m.id);

    </div>
    ${S.mesaForm ? sheetMesaForm() : ''}
  </div>`;
}

window.guardarMesa = async function(){
  const nombre = document.getElementById('mf-nombre').value.trim();
  const zonaInput = S.mesaForm.zonaNueva ? document.getElementById('mf-zona').value.trim() : S.mesaForm.zona;
  if(!nombre){ alert('Ingresá un nombre para la mesa.'); return; }
  if(!zonaInput){ alert('Ingresá o elegí una zona.'); return; }

  if(S.mesaForm.id){
    const { data } = await DB.actualizarMesa(S.mesaForm.id, { nombre, zona: zonaInput });
    S.mesas = S.mesas.map(m=>m.id===S.mesaForm.id?{...m,...data}:m);
  } else {
    const { data } = await DB.crearMesa(S.negocio.id, nombre, zonaInput, 4);
    if(data) S.mesas.push(data);
  }
  S.mesaZona = zonaInput;
  S.mesaForm = null;
  R();
};

  S.mesaForm = { id: m.id, nombre: m.nombre, zona: m.zona, zonaNueva: false };

window.eliminarMesaUI = async function(mid){
  if(!confirm('¿Eliminar esta mesa? Se borrará también su comanda actual.')) return;
  await DB.vaciarPedidosMesa(mid);
  await DB.sb.from('mesas').delete().eq('id', mid);
  S.mesas = S.mesas.filter(m=>m.id!==mid);
  S.mesaForm = null;
  S.mesaSel = null;
  R();
};

window.abrirMesa = async function(mid){
  S.mesaSel = mid;
  S.mesaPedidos = await DB.listarPedidosMesa(mid);

  // Confirmación implícita de entrega: si el mozo entra a la mesa y hay
  // items "listo" esperando, se marcan como "servido" automáticamente —
  // sin pedirle un toque extra. El solo hecho de entrar a revisar la mesa
  // ya es la señal de que está yendo a atenderla.
  const listosIds = S.mesaPedidos.filter(p => p.estado === 'listo').map(p => p.id);
  if(listosIds.length){
    await DB.sb.from('pedidos_mesa').update({ estado: 'servido' }).in('id', listosIds);
    S.mesaPedidos = S.mesaPedidos.map(p => listosIds.includes(p.id) ? {...p, estado:'servido'} : p);
    // Actualizar también el estado local del mapa para que no quede la alerta pegada
    if(S.pedidosPorMesa && S.pedidosPorMesa[mid]){
      S.pedidosPorMesa[mid] = S.pedidosPorMesa[mid].filter(p => !listosIds.includes(p.id));
    }
    if(S.itemsListos) delete S.itemsListos[mid];
  }

  R();
};

window.seleccionarProductoMesa = async function(pid){
  S.mesaAddSel = pid;
  S.mesaAddCant = 1;
  S.mesaAddMods = {};
  S.mesaAddGrupos = await DB.listarModificadoresProducto(pid);

window.toggleMesaMod = function(grupoId, opcionId, multiple){
  const mods = S.mesaAddMods || {};
  const actual = mods[grupoId] || [];
  if(multiple){
    S.mesaAddMods = { ...mods, [grupoId]: actual.includes(opcionId) ? actual.filter(x=>x!==opcionId) : [...actual, opcionId] };
  } else {
    S.mesaAddMods = { ...mods, [grupoId]: actual.includes(opcionId) ? [] : [opcionId] };
  }
  R();
};

window.confirmarAgregarAMesa = async function(){
  const p = S.productos.find(x=>x.id===S.mesaAddSel);
  const cant = S.mesaAddCant || 1;
  const grupos = S.mesaAddGrupos || [];
  const mods = S.mesaAddMods || {};

  // Construir resumen de modificadores para guardar y mostrar en comanda
  const modsResumen = grupos
    .filter(g => mods[g.id]?.length)
    .map(g => ({
      grupo: g.nombre,
      opciones: (mods[g.id]||[]).map(oid => {
        const op = (g.modificador_opciones||[]).find(o=>o.id===oid);
        return op?.nombre || '';
      }).filter(Boolean)
    }));

  const { data: pedido } = await DB.agregarPedidoMesaConCantidad(S.mesaSel, S.negocio.id, S.empleadoActivo.id, p, cant);
  if(pedido && modsResumen.length){
    await DB.guardarModificadoresPedido(pedido.id, modsResumen);
    pedido.modificadores = modsResumen;
  }
  await DB.actualizarMesa(S.mesaSel, { estado: 'ocupada', abierta_en: new Date().toISOString() });
  S.mesaPedidos = await DB.listarPedidosMesa(S.mesaSel);
  const m = S.mesas.find(x=>x.id===S.mesaSel); if(m) m.estado='ocupada';
  S.mesaAddView = false;
  S.mesaAddSel = null;
  S.mesaAddCant = 1;
  S.mesaAddMods = {};
  S.mesaAddGrupos = [];
  R();
};

window.confirmarCobroMesa = async function(total){
  if(S.empleadoActivo.rol === 'mesero'){ alert('No tenés permiso para cobrar. Pedile al cajero.'); return; }
  const items = (S.mesaPedidos||[]).map(p=>({ producto_id: p.producto_id, nombre_producto: p.nombre_producto, precio_unitario: p.precio_unitario, cantidad: p.cantidad }));
  const { error } = await DB.registrarVenta({
    negocioId: S.negocio.id, empleadoId: S.empleadoActivo.id, turnoId: S.turno.id,
    mesaId: S.mesaSel, subtotal: total, descuento: 0, total,
    metodoPago: S.mesaPM, efectivoRecibido: S.mesaPM==='efectivo'?(parseFloat(S.mesaCash)||0):null,
    items,
  });
  if(error){ alert('Error: '+error.message); return; }
  await DB.vaciarPedidosMesa(S.mesaSel);
  await DB.actualizarMesa(S.mesaSel, { estado:'libre', abierta_en: null });
  const m = S.mesas.find(x=>x.id===S.mesaSel); if(m) m.estado='libre';
  S.productos = await DB.listarProductos(S.negocio.id);
  S.mesaCobrarSheet=false; S.mesaSel=null;
  R();
};

function calcRentabilidad(p){
  // Calcula la rentabilidad real de un producto, descontando IVA del precio de venta.
  const ivaPct = parseFloat(S.negocio.config?.impuesto_pct) || 0;
  const precioNeto = ivaPct > 0 ? Math.round(p.precio / (1 + ivaPct/100)) : p.precio;
  const ivaUnit = p.precio - precioNeto;
  const costo = p.precio_costo || null;
  const ganancia = costo != null ? precioNeto - costo : null;
  const margenReal = ganancia != null && precioNeto > 0 ? Math.round(ganancia/precioNeto*100) : null;
  const margenSinIva = costo != null && p.precio > 0 ? Math.round((p.precio-costo)/p.precio*100) : null;
  return { precioNeto, ivaUnit, ivaPct, costo, ganancia, margenReal, margenSinIva };
}

        const r = calcRentabilidad(p);

        return `<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:9px">

// Comprime una imagen en el navegador antes de subirla, redimensionando
// el lado más largo a `maxDim` px y reexportando como JPEG con calidad reducida.
// Esto cuida el límite gratuito de Storage en Supabase (1GB / 2GB bandwidth):
// una foto de cámara sin comprimir puede pesar 3-8MB; comprimida queda en 80-200KB.
function comprimirImagen(file, maxDim = 800, calidad = 0.78){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      let { width, height } = img;
      if(width > height && width > maxDim){
        height = Math.round(height * (maxDim / width));
        width = maxDim;
      } else if(height > maxDim){
        width = Math.round(width * (maxDim / height));
        height = maxDim;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob) => {
        if(!blob){ reject(new Error('No se pudo comprimir la imagen')); return; }
        const nombreComprimido = (file.name || 'foto').replace(/\.[^.]+$/, '') + '.jpg';
        resolve(new File([blob], nombreComprimido, { type: 'image/jpeg' }));
      }, 'image/jpeg', calidad);
    };
    img.onerror = () => reject(new Error('No se pudo leer la imagen'));
    reader.readAsDataURL(file);
  });
}

window.subirFotoProductoUI = async function(input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 15*1024*1024){ alert('La imagen es muy grande. Máximo 15MB.'); return; }

  S.subiendoFoto = true; R();
  try {
    const fileComprimido = await comprimirImagen(file);
    console.log(`[Nativ POS] Foto comprimida: ${(file.size/1024).toFixed(0)}KB → ${(fileComprimido.size/1024).toFixed(0)}KB`);

    // Usamos un id temporal si el producto todavía no existe (alta nueva)
    const productoIdTmp = S.prodForm.id || 'nuevo-' + Date.now();
    const { url, error } = await DB.subirFotoProducto(S.negocio.id, productoIdTmp, fileComprimido);
    S.subiendoFoto = false;

    S.prodForm.foto_url = url;
    R();

    S.subiendoFoto = false;
    alert('No se pudo procesar la imagen: ' + e.message);
    R();
  }
};

function margenHTML(precioStr, costoStr){
  const precio = parseFloat(precioStr) || 0;
  const costo = parseFloat(costoStr) || 0;
  if(!precio || !costo) return '';
  const ganancia = precio - costo;
  const margenPct = Math.round(ganancia/precio*100);
  const color = margenPct >= 40 ? 'var(--money)' : margenPct >= 20 ? 'var(--warn)' : 'var(--danger)';
  const bg = margenPct >= 40 ? 'var(--money-soft)' : margenPct >= 20 ? 'var(--warn-soft)' : 'var(--danger-soft)';
  return `<div style="background:${bg};border-radius:var(--r-sm);padding:11px 14px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;font-weight:700;color:${color}">Ganancia: ${f$(ganancia)} por unidad</span>
    <span style="font-size:15px;font-weight:800;color:${color}">${margenPct}%</span>
  </div>`;
}

async function cargarReportes(){
  const periodo = S.repPeriodo || 'hoy';
  let desde = null;
  const now = new Date();
  if(periodo === 'hoy'){ desde = new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString(); }
  else if(periodo === 'semana'){ const d = new Date(now); d.setDate(d.getDate()-7); desde = d.toISOString(); }
  else if(periodo === 'mes'){ desde = new Date(now.getFullYear(),now.getMonth(),1).toISOString(); }

  const ventas = await DB.listarVentas(S.negocio.id, desde ? { desde } : {});

  const porMetodo = {};
  const productosMap = {};
  let total = 0;

  ventas.forEach(v => {
    total += v.total;
    porMetodo[v.metodo_pago] = (porMetodo[v.metodo_pago]||0) + v.total;
    (v.venta_items||[]).forEach(it => {
      if(!productosMap[it.nombre_producto]) productosMap[it.nombre_producto] = { nombre: it.nombre_producto, cantidad: 0, total: 0 };
      productosMap[it.nombre_producto].cantidad += parseFloat(it.cantidad);
      productosMap[it.nombre_producto].total += it.precio_unitario * it.cantidad;
    });
  });

  // Ventas anuladas (consulta aparte porque listarVentas ya filtra anuladas=false)
  let anuladasQuery = DB.sb.from('ventas').select('id', { count: 'exact', head: true }).eq('negocio_id', S.negocio.id).eq('anulada', true);
  if(desde) anuladasQuery = anuladasQuery.gte('ts', desde);
  const { count: anuladas } = await anuladasQuery;

  S.repData = {
    cantidad: ventas.length,
    total,
    porMetodo,
    masVendidos: Object.values(productosMap).sort((a,b)=>b.cantidad-a.cantidad),
    anuladas: anuladas || 0,
  };
  R();
}

async function cargarFinanzas(){
  const negocioId = S.negocio.id;
  const mesISO = new Date().toISOString().slice(0,7);
  const inicioMes = new Date().toISOString().slice(0,7)+'-01';

  const [gastosFijos, gastosVar, ventasMes] = await Promise.all([
    DB.listarGastosFijos(negocioId),
    DB.listarGastosVariables(negocioId, mesISO),
    DB.listarVentas(negocioId, { desde: inicioMes }),
  ]);

  const hoy = new Date().toDateString();
  const ivaPct = parseFloat(S.negocio.config?.impuesto_pct) || 0;
  // Cuando el IVA está configurado, lo separamos del ingreso bruto.
  // Los precios de venta ya incluyen IVA ("precios con IVA"), así que:
  // ingreso neto = total ÷ (1 + ivaPct/100)
  // iva acumulado = total - ingreso neto
  const divisorIva = ivaPct > 0 ? (1 + ivaPct / 100) : 1;

  let totalVentasMes = 0, totalVentasNeto = 0, ivaAcumuladoMes = 0;
  let ventasHoy = 0, ventasNetoHoy = 0, ivaHoy = 0;

  ventasMes.forEach(v => {
    const esHoy = new Date(v.ts).toDateString() === hoy;
    const neto = Math.round(v.total / divisorIva);
    const iva = v.total - neto;
    totalVentasMes += v.total;
    totalVentasNeto += neto;
    ivaAcumuladoMes += iva;
    if(esHoy){ ventasHoy += v.total; ventasNetoHoy += neto; ivaHoy += iva; }
  });

  // Costo de mercadería vendida
  const costoMap = {};
  S.productos.forEach(p => { if(p.precio_costo != null) costoMap[p.id] = p.precio_costo; });
  let costoMercaderia = 0, costoMercaderiaHoy = 0;
  ventasMes.forEach(v => {
    const esHoy = new Date(v.ts).toDateString() === hoy;
    (v.venta_items||[]).forEach(it => {
      const costoUnit = costoMap[it.producto_id];
      if(costoUnit != null){
        const costoLinea = costoUnit * it.cantidad;
        costoMercaderia += costoLinea;
        if(esHoy) costoMercaderiaHoy += costoLinea;
      }
    });
  });

  S.finData = {
    gastosFijos, gastosVar, ventasMes,
    ventasHoy, ventasNetoHoy, ivaHoy,
    totalVentasMes, totalVentasNeto, ivaAcumuladoMes,
    costoMercaderia, costoMercaderiaHoy,
    ivaPct,
  };
  R();
}

function diasMesFin(){ return new Date(new Date().getFullYear(), new Date().getMonth()+1, 0).getDate(); }
function diaActFin(){ return new Date().getDate(); }
function totalFijosFin(){ return (S.finData.gastosFijos||[]).reduce((a,g)=>a+g.monto,0); }
function totalVarFin(){ return (S.finData.gastosVar||[]).reduce((a,g)=>a+g.monto,0); }
function costoMercaderiaFin(){ return S.finData.costoMercaderia || 0; }
// La ganancia real se calcula sobre el ingreso NETO (sin IVA), no el bruto
function gananciaFin(){ return S.finData.totalVentasNeto - totalFijosFin() - totalVarFin() - costoMercaderiaFin(); }
function margenFin(){ const v=S.finData.totalVentasNeto; return v ? Math.round(gananciaFin()/v*100) : 0; }
function promDiarioFin(){
  const byDay = {};
  S.finData.ventasMes.forEach(v=>{ const d=new Date(v.ts).toDateString(); byDay[d]=(byDay[d]||0)+v.total; });
  const vals = Object.values(byDay);
  return vals.length ? vals.reduce((a,v)=>a+v,0)/vals.length : 0;
}

function finDash(){
  const gf = totalFijosFin(), gv = totalVarFin(), cm = costoMercaderiaFin();
  const vm = S.finData.totalVentasMes;         // ingresos brutos (con IVA)
  const vmNeto = S.finData.totalVentasNeto;    // ingresos netos (sin IVA)
  const iva = S.finData.ivaAcumuladoMes || 0; // IVA del mes a remitir a AFIP
  const ivaPct = S.finData.ivaPct || 0;
  const gan = gananciaFin(), mg = margenFin(); // ya calculados sobre neto
  const vh = S.finData.ventasHoy;

window.guardarGastoFin = async function(){
  const f = S.finForm;
  const nombre = document.getElementById('ff-nombre').value.trim();
  const monto = parseFloat(document.getElementById('ff-monto').value) || 0;
  if(!nombre || !monto){ alert('Completá nombre y monto.'); return; }

  if(f.tipo === 'fijo'){
    const { data } = await DB.crearGastoFijo(S.negocio.id, nombre, monto, f.categoria);
    if(data) S.finData.gastosFijos.push(data);

    const { data } = await DB.crearGastoVariable(S.negocio.id, nombre, monto, f.categoria);

  }
  S.finForm = null;
  R();
};

window.guardarConfig = async function(){
  const f = S.cfgForm;
  const nombre = document.getElementById('cfg-nombre').value.trim();
  const ticket_pie = document.getElementById('cfg-pie').value.trim();
  const tc_usd = f.moneda_usd ? (parseFloat(document.getElementById('cfg-tc-usd')?.value) || 0) : 0;
  const tc_brl = f.moneda_brl ? (parseFloat(document.getElementById('cfg-tc-brl')?.value) || 0) : 0;
  const impuesto_pct = parseFloat(document.getElementById('cfg-impuesto')?.value) || 0;

  if(!nombre){ alert('El nombre del negocio no puede estar vacío.'); return; }

  if(nombre !== S.negocio.nombre){
    await DB.actualizarNegocio(S.negocio.id, { nombre, controla_stock: f.controla_stock });
    S.negocio.nombre = nombre;
  } else {
    await DB.actualizarNegocio(S.negocio.id, { controla_stock: f.controla_stock });
  }
  S.negocio.controla_stock = f.controla_stock;

  const { data } = await DB.actualizarConfigNegocio(S.negocio.id, {
    metodos: f.metodos,
    moneda_usd: f.moneda_usd, tc_usd,
    moneda_brl: f.moneda_brl, tc_brl,
    impuesto_pct,
    ticket_pie,
  });
  if(data) S.negocio.config = data.config;

  S.cfgForm = null;
  alert('Configuración guardada.');
  R();
};

      <div>
        <div style="font-size:16px;font-weight:800">Cocina</div>
        <div style="font-size:12px;color:var(--ink-500);font-weight:600">${S.negocio.nombre} · ${S.empleadoActivo.nombre}</div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700">
        <span style="width:8px;height:8px;border-radius:50%;background:${MONEY};animation:pulse 2s infinite"></span>En vivo
      </div>
      <button onclick="logout()" style="margin-left:10px;width:34px;height:34px;border-radius:99px;background:#252839;border:none;color:#fff;font-size:15px"><i class="ti ti-logout"></i></button>
    </div>
    <div id="cocina-content" style="flex:1;overflow-y:auto;padding:16px">
      ${renderCocinaContent()}
    </div>
  </div>`;
}

function renderCocinaContent(){
  if(!cocinaPedidos.length){
    return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;color:var(--ink-500)">
      <i class="ti ti-check" style="font-size:52px;color:#2a2d3a"></i>
      <p style="font-size:15px;font-weight:700">Todo al día</p>
      <span style="font-size:12px">Sin pedidos pendientes</span>
    </div>`;
  }

  const mesasMap = {};
  cocinaPedidos.forEach(p => {
    const nombre = p.mesas?.nombre || 'Mesa ?';
    if(!mesasMap[p.mesa_id]) mesasMap[p.mesa_id] = { nombre, items: [], ts: p.creado_en };
    mesasMap[key].items.push(p);
    if(p.creado_en < mesasMap[key].ts) mesasMap[key].ts = p.creado_en;
  });

  return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">
    ${Object.entries(mesasMap).map(([mesaId, m]) => {
      const mins = Math.floor((Date.now() - new Date(m.ts)) / 60000);
      const timerColor = mins < 10 ? MONEY : mins < 20 ? 'var(--warn)' : 'var(--danger)';
      const timerBg = mins < 10 ? '#1a3a28' : mins < 20 ? '#3a2a10' : '#3a1a1a';
      const pendientes = m.items.filter(i=>i.estado!=='listo').length;

      return `<div style="background:#1e2330;border-radius:18px;overflow:hidden;border:1.5px solid #2a2d3a">
        <div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2d3a">
          <span style="font-size:15px;font-weight:800">${m.nombre}</span>
          <span style="font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px;background:${timerBg};color:${timerColor}"><i class="ti ti-clock" style="font-size:11px"></i> ${mins}m</span>
        </div>
        ${m.items.map(item => `
          <div onclick="toggleItemCocina('${item.id}','${item.estado}')" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #2a2d3a;cursor:pointer;${item.estado==='listo'?'opacity:.45':''}">
            <div style="width:32px;height:32px;border-radius:9px;background:#252839;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:${item.estado==='cocina'?'var(--warn)':'#fff'}">${item.cantidad}×</div>
            <div style="flex:1">
              <div style="font-size:14px;font-weight:700;line-height:1.3">${item.nombre_producto}</div>
              ${(item.modificadores||[]).length?`<div style="font-size:12px;color:#f0a500;font-weight:600;margin-top:3px">${(item.modificadores||[]).map(m=>m.grupo+': '+m.opciones.join(', ')).join(' · ')}</div>`:''}
              ${item.nota?`<div style="font-size:11px;color:var(--warn);font-weight:600;margin-top:2px">⚠ ${item.nota}</div>`:''}
            </div>
            <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:${item.estado==='listo'?'#1a3a28':item.estado==='cocina'?'#3a2a10':'#252839'};color:${item.estado==='listo'?MONEY:item.estado==='cocina'?'var(--warn)':'var(--ink-500)'}">
              <i class="ti ${item.estado==='listo'?'ti-check':item.estado==='cocina'?'ti-flame':'ti-clock'}"></i>
            </div>
          </div>`).join('')}
        ${pendientes>0?`<button onclick="todosListosCocina('${mesaId}')" style="width:100%;padding:11px;background:#1a3a28;color:${MONEY};border:none;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer">
          <i class="ti ti-checks"></i> Todo listo — ${m.nombre}
        </button>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function beepCocina(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; osc.type = 'sine';
    gain.gain.setValueAtTime(.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + .4);
  } catch(e){}
}

async function cargarCocina(){
  if(!S.negocio || S.empleadoActivo?.rol !== 'cocinero') return;
  const { data, error } = await DB.sb.from('pedidos_mesa')
    .select('*, mesas(nombre)')
    .eq('negocio_id', S.negocio.id)
    .in('estado', ['pendiente','cocina'])
    .order('creado_en', { ascending: true });

  if(error) return;

  const nuevosIds = (data||[]).map(p=>p.id);
  const viejosIds = cocinaPedidos.map(p=>p.id);
  const hayNuevos = nuevosIds.some(id => !viejosIds.includes(id));
  if(hayNuevos && cocinaPedidos.length > 0) beepCocina();

  cocinaPedidos = data || [];
  const el = document.getElementById('cocina-content');
  if(el) el.innerHTML = renderCocinaContent();
}

window.toggleItemCocina = async function(id, estadoActual){
  const siguiente = estadoActual === 'pendiente' ? 'cocina' : estadoActual === 'cocina' ? 'listo' : 'pendiente';
  await DB.sb.from('pedidos_mesa').update({ estado: siguiente }).eq('id', id);
  if(siguiente === 'listo'){
    cocinaPedidos = cocinaPedidos.filter(p => p.id !== id);
  } else {
    cocinaPedidos = cocinaPedidos.map(p => p.id===id ? {...p, estado:siguiente} : p);
  }
  const el = document.getElementById('cocina-content');
  if(el) el.innerHTML = renderCocinaContent();
};

window.todosListosCocina = async function(mesaId){
  await DB.sb.from('pedidos_mesa').update({ estado:'listo' }).eq('mesa_id', mesaId).in('estado',['pendiente','cocina']);
  cocinaPedidos = cocinaPedidos.filter(p => p.mesa_id !== mesaId);
  const el = document.getElementById('cocina-content');
  if(el) el.innerHTML = renderCocinaContent();
};


// ════════════════════════════════════════════════════════════
// RECIBOS — historial de ventas, detalle y anulación
// ════════════════════════════════════════════════════════════
function renderRecibos(back){
  if(S.ventaSel) return renderVentaDetalle(back);
  if(!S.recibosData){ cargarRecibos(); return `<div style="display:flex;flex-direction:column;flex:1">${header('Recibos',{back})}<div class="center-screen"><span class="spinner" style="border-top-color:${A};border-color:rgba(26,63,160,.2)"></span></div></div>`; }

  const ventas = S.recibosData;
  return `<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    ${header('Recibos', { back })}
    <div style="flex:1;overflow-y:auto;padding:12px var(--sp-4)">
      ${!ventas.length ? `<div style="text-align:center;padding:40px;color:var(--ink-500)"><i class="ti ti-receipt" style="font-size:36px;display:block;margin-bottom:10px"></i><p style="font-size:13px">Sin ventas registradas todavía.</p></div>`
      : ventas.map(v => {
        const metLabels = {efectivo:'Efectivo',transferencia:'Transferencia',tarjeta:'Tarjeta',ctacte:'Cta. corriente'};
        const fecha = new Date(v.ts);
        const hora = fecha.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
        const cantItems = (v.venta_items||[]).reduce((a,it)=>a+parseFloat(it.cantidad),0);
        return `<div onclick="verVenta('${v.id}')" class="card" style="display:flex;align-items:center;gap:12px;padding:13px 14px;margin-bottom:9px;cursor:pointer;${v.anulada?'opacity:.5':''}">
          <div style="width:42px;height:42px;border-radius:12px;background:${v.anulada?'var(--danger-soft)':'var(--money-soft)'};display:flex;align-items:center;justify-content:center;font-size:18px;color:${v.anulada?'var(--danger)':MONEY}"><i class="ti ${v.anulada?'ti-x':'ti-receipt'}"></i></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700">${cantItems} artículo${cantItems!=1?'s':''} · ${metLabels[v.metodo_pago]||v.metodo_pago}</div>
            <div style="font-size:11px;color:var(--ink-500);font-weight:600">${hora}${v.anulada?' · Anulada':''}</div>
          </div>
          <div style="font-size:15px;font-weight:800;color:${v.anulada?'var(--ink-500)':'var(--ink-900)'};${v.anulada?'text-decoration:line-through':''}">${f$(v.total)}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

async function cargarRecibos(){
  // Traemos también las anuladas para mostrarlas tachadas (auditoría)
  const { data } = await DB.sb.from('ventas')
    .select('*, venta_items(*)')
    .eq('negocio_id', S.negocio.id)
    .order('ts', { ascending: false })
    .limit(50);
  S.recibosData = data || [];
  R();
}

window.verVenta = function(vid){
  S.ventaSel = vid;
  R();
};

function renderVentaDetalle(back){
  const v = S.recibosData.find(x=>x.id===S.ventaSel);
  if(!v){ S.ventaSel=null; R(); return ''; }
  const metLabels = {efectivo:'Efectivo',transferencia:'Transferencia',tarjeta:'Tarjeta',ctacte:'Cuenta corriente'};
  const puedeAnular = !v.anulada && (S.empleadoActivo.rol === 'dueno' || S.empleadoActivo.rol === 'cajero');
  const fecha = new Date(v.ts);

  return `<div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    ${header('Detalle de venta', { back: "S.ventaSel=null;R()" })}
    <div style="flex:1;overflow-y:auto;padding:14px var(--sp-4)">
      ${v.anulada ? `<div style="background:var(--danger-soft);border-radius:var(--r-md);padding:12px 14px;display:flex;align-items:center;gap:9px;margin-bottom:14px"><i class="ti ti-alert-triangle" style="color:var(--danger);font-size:18px"></i><span style="font-size:13px;font-weight:700;color:var(--danger)">Esta venta fue anulada</span></div>` : ''}

      <div style="text-align:center;margin-bottom:18px">
        <div style="font-size:12px;color:var(--ink-500);font-weight:600">${fecha.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})} · ${fecha.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}</div>
        <div style="font-size:34px;font-weight:800;margin-top:4px;${v.anulada?'text-decoration:line-through;color:var(--ink-500)':''}">${f$(v.total)}</div>
        <div style="font-size:13px;color:var(--ink-500);font-weight:600">${metLabels[v.metodo_pago]||v.metodo_pago}</div>
      </div>

      <div class="sec-label">Artículos</div>
      <div class="card" style="overflow:hidden;margin-bottom:14px">
        ${(v.venta_items||[]).map(it=>`<div style="display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--ink-100)">
          <span style="font-size:13px;font-weight:700;color:var(--ink-500);width:26px">${it.cantidad}×</span>
          <span style="flex:1;font-size:14px;font-weight:600">${it.nombre_producto}</span>
          <span style="font-size:14px;font-weight:700">${f$(it.precio_unitario*it.cantidad)}</span>
        </div>`).join('')}
      </div>

      <div class="card" style="padding:13px 14px;margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--ink-700);margin-bottom:4px"><span>Subtotal</span><span>${f$(v.subtotal)}</span></div>
        ${v.descuento>0?`<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--danger);margin-bottom:4px"><span>Descuento</span><span>−${f$(v.descuento)}</span></div>`:''}
        ${v.metodo_pago==='efectivo' && v.efectivo_recibido ? `<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--ink-700)"><span>Recibido</span><span>${f$(v.efectivo_recibido)}</span></div>` : ''}
      </div>

      ${puedeAnular ? `<button class="btn-danger-ghost" onclick="confirmarAnularVenta('${v.id}')"><i class="ti ti-x"></i> Anular esta venta</button>` : ''}
    </div>
  </div>`;
}

window.confirmarAnularVenta = async function(vid){
  if(!confirm('¿Anular esta venta? Se repondrá el stock de los productos vendidos. Esta acción no se puede deshacer.')) return;
  const { error } = await DB.anularVenta(vid);
  if(error){ alert('Error al anular: ' + error.message); return; }

  // Actualizar estado local
  S.recibosData = S.recibosData.map(v => v.id===vid ? {...v, anulada:true} : v);
  // Refrescar productos por si cambió el stock
  S.productos = await DB.listarProductos(S.negocio.id);
  S.ventaSel = null;
  R();
};
</script>
